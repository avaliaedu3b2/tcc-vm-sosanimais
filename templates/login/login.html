<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar - SOS Animais</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      margin: 0;
    }
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 6rem;
    }
    .login-box {
      width: 100%;
      max-width: 310px;
    }
    h2 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .btn-nav-primary {
      background: #9b59d0;
      color: #fff !important;
      border-radius: 50px;
      padding: 8px 22px;
      font-weight: 600;
      font-size: 0.88rem;
      border: none;
      transition: background .2s, transform .15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-nav-primary:hover {
      background: #8344bb;
      transform: translateY(-1px);
    }
    .sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.6rem;
    }
    .field-wrap {
      position: relative;
      border: 1.5px solid #c9a8e8;
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 14px;
      background: #fff;
      transition: border-color 0.2s;
    }
    .field-wrap.focused {
      border-color: #9b59d0;
    }
    .field-wrap label {
      display: block;
      font-size: 10px;
      color: #9b59d0;
      margin-bottom: 1px;
      font-weight: 500;
    }
    .field-wrap input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 14px;
      color: #333;
      background: transparent;
      padding: 0;
      font-family: inherit;
    }
    .field-wrap input::placeholder {
      color: #bbb;
    }
    .eye-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover {
      color: #9b59d0;
    }
    .form-check-input:checked {
      background-color: #9b59d0;
      border-color: #9b59d0;
    }
    .form-check-input:focus {
      box-shadow: 0 0 0 3px rgba(155, 89, 208, 0.2);
    }
    .form-check-label {
      font-size: 13px;
      color: #444;
    }
    .btn-signin {
      width: 100%;
      padding: 12px;
      background: #9b59d0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-signin:hover {
      background: #8344bb;
    }
    .create-row {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 14px;
    }
    .create-row a {
      color: #9b59d0;
      text-decoration: none;
      font-weight: 500;
    }
    .create-row a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">SOS Animais Matão</a>
      <div class="d-flex">
        <a class="btn-nav-primary" href="/">Voltar</a>
      </div>
    </div>
  </nav>
  <div class="login-wrapper">
    <div class="login-box">
      <h2>Entrar</h2>
      <p class="sub">Digite seu email e senha para acessar o painel.</p>
 
      <div class="field-wrap" id="wrap-email">
        <label>Email</label>
        <input
          type="email"
          id="email"
          placeholder="seu@email.com"
          onfocus="document.getElementById('wrap-email').classList.add('focused')"
          onblur="document.getElementById('wrap-email').classList.remove('focused')"
        />
      </div>
 
      <div class="field-wrap" id="wrap-pwd" style="padding-right: 38px;">
        <input
          type="password"
          placeholder="Senha"
          id="pwd"
          onfocus="document.getElementById('wrap-pwd').classList.add('focused')"
          onblur="document.getElementById('wrap-pwd').classList.remove('focused')"
        />
        <button class="eye-btn" onclick="togglePwd()" type="button" aria-label="Mostrar senha">
          <svg id="eye-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
 
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="keep" />
        <label class="form-check-label" for="keep">Manter-me conectado</label>
      </div>
 
      <button class="btn-signin" onclick="return submitLogin()">Entrar</button>
      <div id="loginMessage" style="margin-top: 16px; font-size: 0.95rem; color: #d32f2f;"></div>
      <div class="create-row">Ainda não tem conta? <a href="#">Crie uma</a></div>
    </div>
  </div>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePwd() {
      const inp = document.getElementById('pwd');
      const svg = document.getElementById('eye-svg');
      if (inp.type === 'password') {
        inp.type = 'text';
        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      } else {
        inp.type = 'password';
        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      }
    }

    function submitLogin() {
      const email = document.getElementById('email').value.trim();
      const messageEl = document.getElementById('loginMessage');
      messageEl.style.color = '#d32f2f';
      if (!email) {
        messageEl.textContent = 'Por favor, informe seu email.';
        return false;
      }
      messageEl.style.color = '#2e7d32';
      messageEl.textContent = 'Login enviado com sucesso.';
      return false;
    }
  </script>
</body>
</html>
